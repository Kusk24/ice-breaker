<svg width="360" height="220" viewBox="0 0 360 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gBody" x1="160" y1="60" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF6FF"/>
      <stop offset="1" stop-color="#C0D8EE"/>
    </linearGradient>
    <linearGradient id="gNose" x1="228" y1="62" x2="318" y2="158" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF5A70"/>
      <stop offset="1" stop-color="#D0082C"/>
    </linearGradient>
    <linearGradient id="gFin" x1="38" y1="30" x2="102" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF4860"/>
      <stop offset="1" stop-color="#C4062A"/>
    </linearGradient>
    <linearGradient id="gEngine" x1="80" y1="84" x2="102" y2="136" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3558A8"/>
      <stop offset="1" stop-color="#172C62"/>
    </linearGradient>
    <filter id="fShad" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="rgba(8,20,60,0.22)"/>
    </filter>
  </defs>

  <!-- Top fin: sweeps up-left from engine area -->
  <path d="M 100 74 C 86 62, 62 46, 38 28 L 56 46 C 72 58, 88 66, 102 78 Z"
        fill="url(#gFin)"/>

  <!-- Bottom fin: sweeps down-left, symmetric -->
  <path d="M 100 146 C 86 158, 62 174, 38 192 L 56 174 C 72 162, 88 154, 102 142 Z"
        fill="url(#gFin)"/>

  <!-- Main body: smooth horizontal capsule, flat on left, rounded nose on right -->
  <path d="M 100 68 L 232 62 C 268 60, 318 80, 318 110 C 318 140, 268 160, 232 158 L 100 152 Z"
        fill="url(#gBody)" filter="url(#fShad)"/>

  <!-- Nose cone: red section covering right ~35% of body -->
  <path d="M 224 64 C 256 62, 318 84, 318 110 C 318 136, 256 158, 224 156 Z"
        fill="url(#gNose)"/>

  <!-- Engine collar: dark navy block on the left -->
  <rect x="80" y="84" width="22" height="52" rx="5" fill="url(#gEngine)"/>

  <!-- Seam line separating nose from body -->
  <path d="M 226 65 L 222 155" stroke="rgba(190,38,48,0.4)" stroke-width="1.5"/>

  <!-- Body highlight along top -->
  <path d="M 104 70 L 222 64 C 250 63, 272 70, 285 80 C 258 74, 220 70, 104 74 Z"
        fill="white" opacity="0.40"/>

  <!-- Nose highlight -->
  <path d="M 230 68 C 260 67, 310 88, 314 106 C 292 88, 262 76, 230 72 Z"
        fill="white" opacity="0.30"/>
</svg>
